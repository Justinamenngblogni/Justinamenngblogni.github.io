<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <rect width="800" height="600" fill="#e3dcc7"/>
  <!-- Grid texture -->
  <g stroke="#0d1117" stroke-width="0.5" opacity="0.08">
    <path d="M 0 100 H 800 M 0 200 H 800 M 0 300 H 800 M 0 400 H 800 M 0 500 H 800"/>
    <path d="M 100 0 V 600 M 200 0 V 600 M 300 0 V 600 M 400 0 V 600 M 500 0 V 600 M 600 0 V 600 M 700 0 V 600"/>
  </g>
  <!-- Tic-tac-toe board -->
  <g transform="translate(120 380)" stroke="#0d1117" stroke-width="3" fill="none" opacity="0.7">
    <line x1="60" y1="0" x2="60" y2="180"/>
    <line x1="120" y1="0" x2="120" y2="180"/>
    <line x1="0" y1="60" x2="180" y2="60"/>
    <line x1="0" y1="120" x2="180" y2="120"/>
    <!-- X and O marks -->
    <circle cx="30" cy="30" r="18" stroke="#b04a2b"/>
    <line x1="80" y1="80" x2="100" y2="100" stroke="#b04a2b"/>
    <line x1="100" y1="80" x2="80" y2="100" stroke="#b04a2b"/>
    <circle cx="150" cy="150" r="18" stroke="#b04a2b"/>
  </g>
  <!-- Robotic arm -->
  <g stroke="#0d1117" stroke-width="6" fill="none" stroke-linecap="round">
    <!-- Base -->
    <path d="M 500 540 L 580 540" stroke-width="10"/>
    <!-- Arm segments -->
    <line x1="540" y1="540" x2="540" y2="380"/>
    <line x1="540" y1="380" x2="420" y2="280"/>
    <line x1="420" y1="280" x2="320" y2="320"/>
    <!-- Joints -->
    <circle cx="540" cy="540" r="14" fill="#b04a2b" stroke="none"/>
    <circle cx="540" cy="380" r="12" fill="#0d1117" stroke="none"/>
    <circle cx="420" cy="280" r="12" fill="#0d1117" stroke="none"/>
    <circle cx="320" cy="320" r="8" fill="#b04a2b" stroke="none"/>
    <!-- Gripper -->
    <path d="M 320 320 L 295 340 M 320 320 L 295 300"/>
  </g>
  <!-- Tech labels -->
  <g font-family="ui-monospace, monospace" font-size="11" fill="#6b6a5e" letter-spacing="2">
    <text x="40" y="50">DQN AGENT</text>
    <text x="40" y="70" font-size="9" opacity="0.7">ACCURACY 98%</text>
    <text x="680" y="50" text-anchor="end">YOLO · v8</text>
    <text x="680" y="70" font-size="9" opacity="0.7" text-anchor="end">RASPBERRY PI 5</text>
  </g>
  <!-- Detection box -->
  <g stroke="#b04a2b" stroke-width="1.5" fill="none" stroke-dasharray="4 3">
    <rect x="110" y="370" width="190" height="200"/>
  </g>
</svg>
