<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <rect width="800" height="600" fill="#ede8d8"/>
  <!-- Topo / road map background -->
  <g stroke="#0d1117" stroke-width="1" fill="none" opacity="0.15">
    <path d="M 0 400 C 200 380, 300 420, 500 400 S 700 380, 800 400"/>
    <path d="M 0 440 C 200 420, 300 460, 500 440 S 700 420, 800 440"/>
    <path d="M 0 360 C 200 340, 300 380, 500 360 S 700 340, 800 360"/>
  </g>
  <!-- Path / trajectory -->
  <path d="M 80 500 Q 200 450, 320 480 T 560 420 T 750 380" stroke="#b04a2b" stroke-width="2.5" fill="none" stroke-dasharray="6 4"/>
  <!-- Waypoints -->
  <g fill="#b04a2b">
    <circle cx="80" cy="500" r="5"/>
    <circle cx="320" cy="480" r="5"/>
    <circle cx="560" cy="420" r="5"/>
    <circle cx="750" cy="380" r="5"/>
  </g>
  <!-- Vehicle -->
  <g transform="translate(400 200)">
    <!-- Chassis -->
    <rect x="-80" y="-30" width="160" height="60" fill="#0d1117" rx="6"/>
    <rect x="-60" y="-50" width="120" height="30" fill="#1c2230" rx="4"/>
    <!-- Wheels -->
    <circle cx="-50" cy="35" r="14" fill="#0d1117"/>
    <circle cx="-50" cy="35" r="8" fill="#b04a2b"/>
    <circle cx="50" cy="35" r="14" fill="#0d1117"/>
    <circle cx="50" cy="35" r="8" fill="#b04a2b"/>
    <!-- Sensor (LiDAR-style) -->
    <circle cx="0" cy="-60" r="8" fill="#b04a2b"/>
    <!-- Vision cone -->
    <path d="M 0 -60 L -120 -150 A 150 150 0 0 1 120 -150 Z" fill="#b04a2b" opacity="0.08" stroke="#b04a2b" stroke-width="1" stroke-opacity="0.4"/>
    <!-- Camera markers -->
    <rect x="-30" y="0" width="6" height="6" fill="#b04a2b"/>
    <rect x="24" y="0" width="6" height="6" fill="#b04a2b"/>
  </g>
  <!-- Tech labels -->
  <g font-family="ui-monospace, monospace" font-size="11" fill="#6b6a5e" letter-spacing="2">
    <text x="40" y="50">TENSORFLOW VISION</text>
    <text x="40" y="70" font-size="9" opacity="0.7">ACCURACY 97%</text>
    <text x="760" y="50" text-anchor="end">ESP32 · TinyML</text>
    <text x="760" y="70" font-size="9" opacity="0.7" text-anchor="end">FUSION 360 · CAD</text>
  </g>
  <!-- Coords -->
  <g font-family="ui-monospace, monospace" font-size="9" fill="#b04a2b" letter-spacing="1">
    <text x="80" y="520">x=0.0</text>
    <text x="560" y="440">x=12.4</text>
    <text x="700" y="400">x=18.2</text>
  </g>
</svg>
